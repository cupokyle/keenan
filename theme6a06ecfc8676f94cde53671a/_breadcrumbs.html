{% include "translation" %}
{% unless page.is_homepage? or page.level == 0 or page.level == nil %}
  <nav aria-label="breadcrumb" id="breadcrumb" class="{{ class }}">
    <ol class="breadcrumb border-0 bg-transparent pl-0">
      <li class="breadcrumb-item"><a href="/" class="{{ link_class }}">{{ t_home }}</a></li>
      {% for ancestor in page.ancestors %}
        {% unless ancestor.is_homepage? %}
          <li class="breadcrumb-item"><a href="{{ ancestor.url }}" class="{{ link_class }}">{{ ancestor.name }}</a></li>
        {% endunless %}
      {% endfor %}
    </ol>
  </nav>
{% endunless %}
