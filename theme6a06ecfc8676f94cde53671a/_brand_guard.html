<style data-theme-brand-guard="static">
  :root,
  html,
  body,
  body.momentum-theme {
    --theme-color-cream: #f9f3e7;
    --theme-color-primary: #ed2b08;
    /* --theme-color-primary-dark: #c52407; */
    --theme-color-primary-dark: #f9f3e7;
    --theme-color-secondary: #006793;
    --theme-color-accent: #ffb700;
    --theme-color-black: #000000;
    --theme-text-base: #c52407;
    --theme-text-heading: #ed2b08;
    --theme-text-link: #006793;
    --theme-text-link-hover: #004b6c;
    --theme-text-muted: #e1735e;
    --theme-text-on-primary: #f9f3e7;
    --theme-font-sans: "Hanken Grotesk", "Source Sans Pro", Helvetica, Arial, sans-serif;
    --theme-font-serif: "Hanken Grotesk", "Source Sans Pro", Helvetica, Arial, sans-serif;
    --theme-font-mono: "Source Code Pro", monospace;
  }

  html body,
  body.momentum-theme,
  body[class*="page-"] {
    background-color: var(--theme-color-cream) !important;
    color: var(--theme-text-base) !important;
    font-family: var(--theme-font-sans) !important;
  }

  body #header .nav-link {
    color: var(--theme-color-accent) !important;
  }

  body,
  body *:not(svg):not(path):not(use) {
    font-family: var(--theme-font-sans) !important;
  }

  body code,
  body kbd,
  body pre,
  body samp,
  body .text-monospace,
  body .badge,
  body small,
  body .small {
    font-family: var(--theme-font-mono) !important;
  }

  body .text-serif {
    font-family: var(--theme-font-serif) !important;
  }

  body h1,
  body h2,
  body h3,
  body h4,
  body h5,
  body h6,
  body .h1,
  body .h2,
  body .h3,
  body .h4,
  body .h5,
  body .h6,
  body .page-headline,
  body .headline,
  body .title {
    color: var(--theme-text-heading) !important;
    font-family: var(--theme-font-sans) !important;
  }

  body p,
  body li,
  body label,
  body legend,
  body table,
  body .page-content,
  body .page-intro,
  body .card-body,
  body .custom-control-label {
    color: var(--theme-text-base) !important;
  }

  body a,
  body .text-primary,
  body .page-link,
  body .breadcrumb a,
  body .dropdown-item,
  body .list-group-item-action {
    color: var(--theme-text-link) !important;
  }

  body a:hover,
  body a:focus,
  body .page-link:hover,
  body .page-link:focus,
  body .dropdown-item:hover,
  body .dropdown-item:focus,
  body .list-group-item-action:hover,
  body .list-group-item-action:focus {
    color: var(--theme-text-link-hover) !important;
  }

  body .text-muted,
  body .text-black-75,
  body .text-gray-75,
  body .byline,
  body .form-text,
  body .help-block,
  body .metadata,
  body .meta,
  body small,
  body .small {
    color: var(--theme-text-muted) !important;
  }

  body .page,
  body .page-inner,
  body .card,
  body .card-body,
  body .modal-content,
  body .modal-body,
  body .dropdown-menu,
  body .list-group-item,
  body .popover,
  body .toast,
  body #mobileNav,
  body .navbar-collapse,
  body .navbar-more-inner,
  body .wrapper-donation-v2,
  body .wrapper-donation-v2::before,
  body .bg-light,
  body .bg-white,
  body .min-vh-100.bg-white {
    background-color: var(--theme-color-cream) !important;
  }

  body .bg-dark,
  body .page-type-donation-v2 header.bg-dark,
  body .page-type-donation header.bg-dark {
    background-color: var(--theme-color-primary-dark) !important;
    color: var(--theme-text-on-primary) !important;
  }

  body .bg-dark h1,
  body .bg-dark h2,
  body .bg-dark h3,
  body .bg-dark h4,
  body .bg-dark h5,
  body .bg-dark h6,
  body .bg-dark .text-white,
  body .bg-dark .text-light,
  body .page-type-donation-v2 header.bg-dark,
  body .page-type-donation-v2 header.bg-dark *,
  body .page-type-donation header.bg-dark,
  body .page-type-donation header.bg-dark * {
    color: var(--theme-text-on-primary) !important;
  }

  body .btn-primary,
  body .submit-button,
  body input[type="submit"],
  body #cc-request-button button,
  body .donation-v2-amounts .custom-control-input:checked ~ .custom-control-label,
  body .form-amount-options .custom-control-input:checked ~ .custom-control-label {
    background-color: var(--theme-color-primary) !important;
    border-color: var(--theme-color-primary) !important;
    color: var(--theme-text-on-primary) !important;
  }

  body .btn-secondary,
  body .donation-v2-amounts .custom-control-label,
  body .form-amount-options .custom-control-label,
  body .bg-secondary, 
   body header {
    background-color: var(--theme-color-secondary) !important;
    border-color: var(--theme-color-secondary) !important;
    color: var(--theme-text-on-primary) !important;
  }

  body .btn-outline-primary,
  body .btn-link {
    background-color: transparent !important;
    border-color: var(--theme-color-primary) !important;
    color: var(--theme-color-primary) !important;
  }

  body .btn-outline-primary:hover,
  body .btn-outline-primary:focus,
  body .btn-link:hover,
  body .btn-link:focus {
    background-color: var(--theme-color-primary) !important;
    color: var(--theme-text-on-primary) !important;
  }

  body .navbar-light .navbar-nav .nav-link,
  body .navbar-brand,
  body #mobileNav .nav-link,
  body .navbar-more-item,
  body .nav-link,
  body .nav-tabs .nav-link {
    color: var(--theme-color-secondary) !important;
    font-family: var(--theme-font-sans) !important;
  }

  body .navbar-light .navbar-nav .nav-link:hover,
  body .navbar-light .navbar-nav .nav-link:focus,
  body .navbar-brand:hover,
  body .navbar-brand:focus,
  body #mobileNav .nav-link:hover,
  body #mobileNav .nav-link:focus,
  body .navbar-more-item:hover,
  body .navbar-more-item:focus,
  body .nav-link:hover,
  body .nav-link:focus,
  body .nav-tabs .nav-link.active {
    color: var(--theme-color-primary) !important;
  }

  body .form-control,
  body .custom-select,
  body .custom-file-label,
  body .input-group-text,
  body textarea,
  body select,
  body input[type="text"],
  body input[type="email"],
  body input[type="tel"],
  body input[type="url"],
  body input[type="password"],
  body input[type="number"] {
    background-color: var(--theme-color-cream) !important;
    color: var(--theme-text-base) !important;
    font-family: var(--theme-font-sans) !important;
  }

  body .form-control:focus,
  body .custom-select:focus,
  body textarea:focus,
  body select:focus,
  body input:focus {
    border-color: var(--theme-color-primary) !important;
    box-shadow: 0 0 0 0.25rem rgba(237, 43, 8, 0.25) !important;
  }

  @media (max-width: 991.98px) {
    body #mobileNav,
    body .navbar-collapse,
    body .navbar-more-inner,
    body .mobile-nav,
    body .navbar-nav,
    body .dropdown-menu {
      background-color: var(--theme-color-cream) !important;
      color: var(--theme-text-base) !important;
      font-family: var(--theme-font-sans) !important;
    }
  }
</style>
