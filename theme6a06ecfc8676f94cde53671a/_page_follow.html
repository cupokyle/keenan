{% include "translation" %}
{% if page.show_stream? and request.sorta_logged_in? %}
  {% if request.current_signup.following_page_ids contains page.id %}
    <span class="addreaction"><a href="{{ page.unfollow_url }}" class="page-follow delete">{{ t_unfollow_reactions }}</a></span>
  {% else %}
    <span class="addreaction"><a href="{{ page.follow_url }}" class="page-follow post">{{ t_follow_reactions }}</a></span>
  {% endif %}
{% endif %}
